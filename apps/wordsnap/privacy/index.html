<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordSnap — Privacy Policy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1923;
      color: #e0e6ed;
      line-height: 1.7;
      padding: 24px 16px 60px;
    }
    .container { max-width: 720px; margin: 0 auto; }
    header { text-align: center; padding: 40px 0 24px; }
    header h1 { font-size: 28px; font-weight: 700; color: #4fc3f7; }
    header p { color: #90a4ae; margin-top: 8px; font-size: 14px; }
    .lang-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 36px;
    }
    .lang-card {
      display: block;
      padding: 14px 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      text-align: center;
      text-decoration: none;
      color: #b0bec5;
      font-size: 14px;
      transition: all 0.2s;
    }
    .lang-card:hover {
      background: rgba(79,195,247,0.1);
      border-color: #4fc3f7;
      color: #4fc3f7;
    }
    .lang-card .flag { font-size: 24px; display: block; margin-bottom: 6px; }
    .lang-card .name { font-weight: 600; display: block; }
    .lang-card .native { font-size: 12px; color: #546e7a; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>WordSnap</h1>
    <p>바로 영단어 — Privacy Policy / 개인정보처리방침</p>
  </header>

  <div class="lang-grid">
    <a class="lang-card" href="ko.html">
      <span class="flag">🇰🇷</span>
      <span class="name">Korean</span>
      <span class="native">한국어</span>
    </a>
    <a class="lang-card" href="en.html">
      <span class="flag">🇺🇸</span>
      <span class="name">English</span>
      <span class="native">English</span>
    </a>
    <a class="lang-card" href="ja.html">
      <span class="flag">🇯🇵</span>
      <span class="name">Japanese</span>
      <span class="native">日本語</span>
    </a>
    <a class="lang-card" href="zh.html">
      <span class="flag">🇨🇳</span>
      <span class="name">Chinese</span>
      <span class="native">中文</span>
    </a>
    <a class="lang-card" href="es.html">
      <span class="flag">🇪🇸</span>
      <span class="name">Spanish</span>
      <span class="native">Español</span>
    </a>
    <a class="lang-card" href="vi.html">
      <span class="flag">🇻🇳</span>
      <span class="name">Vietnamese</span>
      <span class="native">Tiếng Việt</span>
    </a>
    <a class="lang-card" href="id.html">
      <span class="flag">🇮🇩</span>
      <span class="name">Indonesian</span>
      <span class="native">Bahasa Indonesia</span>
    </a>
  </div>
</div>
</body>
</html>
